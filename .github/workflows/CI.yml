name: CI
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]" || pip install -e . && pip install pytest
      - name: Run tests
        run: pytest tests/ -v

